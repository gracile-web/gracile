# https://help.github.com/en/categories/automating-your-workflow-with-github-actions
# See: https://github.com/JulianCataldo/gh-actions

# For matrix setup:
# https://github.com/withastro/astro/blob/main/.github/workflows/ci.yml
# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/running-variations-of-jobs-in-a-workflow

name: CI / Release

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - .github/**
      - '!.github/workflows/release.yaml'
      - '**/*.md'
    branches:
      - '([0-9])?(.{+([0-9]),x}).x'
      - main
      - next
      - next-major
      - alpha
      - beta
      - 'feat/*'
      - 'fix/*'
      # - to-integrate
      # - to-integrate-next

permissions:
  contents: read # for checkout
  # TODO: Trusted Publishers
  # id-token: write # Required for OIDC

jobs:
  release:
    name: CI / Release

    timeout-minutes: 30

    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance

    runs-on: ubuntu-latest
    # TODO:
    # runs-on: ${{ matrix.os }}
    # timeout-minutes: 25
    # # needs: build
    # strategy:
    #   matrix:
    #     OS: [ubuntu-latest]
    #     NODE_VERSION: [18, 20]
    #     include:
    #       - os: macos-14
    #         NODE_VERSION: 18
    #       - os: windows-latest
    #         NODE_VERSION: 18
    #   fail-fast: false
    # env:
    #   NODE_VERSION: ${{ matrix.NODE_VERSION }}

    steps:
      # MARK: Setup GH Action

      - name: 'Harden Runner'
        uses: 'step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b' # v2.15.0
        with:
          egress-policy: 'audit'

      - name: Git checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # - run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*
      #   persist-credentials: false
      # env:
      #   GIT_COMMITTER_NAME: "GitHub Actions Shell"
      #   GIT_AUTHOR_NAME: "GitHub Actions Shell"
      #   EMAIL: "github-actions[bot]@users.noreply.github.com"

      # MARK: Setup Node env.

      - name: Setup PNPM
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Use Node.js 24
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          registry-url: 'https://registry.npmjs.org'
          node-version: 24
          cache: pnpm

      - name: Install packages
        shell: bash
        run: pnpm install --frozen-lockfile

      # TODO: More tests
      # - name: Syncpack Lint
      #   shell: bash
      #   run: node --run syncpack:lint

      # NOTE: Audit is for prod only because a lot of root packages (like lerna etc.)
      # are used old packages with intricate dependency trees, and they are
      # never shipped to the user. But that's not 100% optimal, as devDeps could
      # provoke some sec issues, too? A middleground is better than nothing and
      # regularly blocked releases for obscure root mono-repo tooling deps.
      - name:
          'Verify the integrity of provenance attestations and registry
          signatures for installed [prod] dependencies'
        run: 'node --run audit'

      # MARK: Lint/Checks pre-build

      - name: Lint last commit — Commitlint
        shell: bash
        run: node --run lint:commit

      # - name: Lint CSS — Stylelint
      #   shell: bash
      #   run: node --run lint:css

      - name: Check all formatting — Prettier
        shell: bash
        run: node --run format

      # MARK: Build packages

      - name: Setup Turbo cache
        uses: dtinth/setup-github-actions-caching-for-turbo@cc723b4600e40a6b8815b65701d8614b91e2669e # v1.3.0

      - name: Build all packages
        shell: bash
        run: node --run build

      # MARK: Lint/Checks post-build

      - name: Cache ESLint results
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ hashFiles('pnpm-lock.yaml', 'eslint.config.js') }}

      - name: Lint JS/TS — ESLint
        shell: bash
        run: node --run lint:es

      # MARK:Tests

      - name: Tests — Units
        shell: bash
        run: node --run test:unit

      # IDEA: Can we avoid duplicating Playwright browser installation for each package? Maybe a single root-level install with a shared cache is enough? For now, just cache per-package to speed up subsequent runs.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('packages/labs/hmr/package.json') }}

      - name: Install Playwright browsers
        shell: bash
        run: npx playwright install --with-deps chromium
        working-directory: packages/labs/hmr

      - name: Tests — Integration
        shell: bash
        run: node --run test:integration

      # MARK: Publish packages
      # NOTE: Auth is configured by setup-node's registry-url above.
      # The NPM_TOKEN secret MUST be a Granular Access Token (or classic Automation
      # token) to bypass 2FA/OTP requirements in CI.

      - name: Git user configuration
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      # MARK: [MAIN]
      - name: 'Lerna publish [main]'
        if: github.ref == 'refs/heads/main'
        # https://github.com/lerna/lerna/issues/2532
        id: graduateRelease
        continue-on-error: true
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          pnpm lerna publish --message 'chore: publish [main] release [skip ci]' --create-release=github --conventional-graduate --yes

      - name: Bump Prod Version Fallback
        if: ${{ always() && steps.graduateRelease.outcome == 'failure'  }}
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          echo Falling back to non-graduate release due to https://github.com/lerna/lerna/issues/2532
          git stash
          pnpm lerna publish --message 'chore: publish [main] release [skip ci]' --create-release=github --yes

      - name: Merge back main into next
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          git checkout next
          git merge main --no-ff -m 'chore: auto-merge main into next [skip ci]'
          git push

      # MARK: [NEXT]
      - name: 'Lerna publish [next]'
        if: github.ref == 'refs/heads/next'
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          pnpm lerna publish --message 'chore: publish [next] pre-release' --conventional-prerelease --pre-dist-tag=next --preid=next --yes

      # MARK: Docs Website

      - name: Build docs website
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next'
        shell: bash
        run: pnpm --prefix docs/website run build

      - name: Index docs with Pagefind
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next'
        shell: bash
        run: pnpm --prefix docs/website run pagefind

      - name: Cache Playwright browsers (docs)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-docs-${{ hashFiles('docs/website/package.json') }}

      - name: Install Playwright browsers (docs)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next'
        shell: bash
        run: npx playwright install --with-deps chromium
        working-directory: docs/website

      - name: Tests — Docs smoke
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next'
        shell: bash
        run: pnpm --prefix docs/website run test:smoke

      - name: 'Deploy docs website [main → production]'
        if: github.ref == 'refs/heads/main'
        env:
          NETLIFY_AUTH_TOKEN: '${{ secrets.NETLIFY_AUTH_TOKEN }}'
          NETLIFY_SITE_ID: '${{ secrets.NETLIFY_SITE_ID }}'
        shell: bash
        run: pnpm --prefix docs/website exec netlify deploy -d ./dist --prod

      - name: 'Deploy docs website [next → preview]'
        if: github.ref == 'refs/heads/next'
        env:
          NETLIFY_AUTH_TOKEN: '${{ secrets.NETLIFY_AUTH_TOKEN }}'
          NETLIFY_SITE_ID: '${{ secrets.NETLIFY_SITE_ID }}'
        shell: bash
        run:
          pnpm --prefix docs/website exec netlify deploy -d ./dist --alias next
